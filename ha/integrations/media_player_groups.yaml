# Media Player Groups for Whole-Home Audio
#
# Add this to /home/sysop/homeassistant/configuration.yaml:
#   media_player: !include_dir_merge_list media_players/
#
# OR paste the groups section directly into configuration.yaml
#
# SETUP NOTE: Echo Dot entity names are auto-generated by Alexa Media Player.
# Format is usually: media_player.echo_dot_<room_name> or media_player.<device_name>
# Update entity_ids below after Alexa Media Player discovers your devices.

media_player:
  - platform: group
    name: Whole House
    unique_id: whole_house_audio_group
    entities:
      # WiiM streamer (update after WiiM integration discovery)
      - media_player.wiim_mini  # or wiim_amp, wiim_pro — check after discovery

      # Echo Dots — update names after Alexa Media Player connects
      # Run: grep media_player /config/.storage/entity_registry | grep echo
      # to find actual entity names, or check HA → Settings → Devices & Services → Alexa
      - media_player.echo_dot_living_room
      - media_player.echo_dot_kitchen
      - media_player.echo_dot_bedroom
      - media_player.echo_dot_bathroom
      - media_player.echo_dot_office
      - media_player.echo_dot_hallway
      # ... add all 15 Echo Dot entities here

  - platform: group
    name: Downstairs
    unique_id: downstairs_audio_group
    entities:
      - media_player.wiim_mini
      - media_player.echo_dot_living_room
      - media_player.echo_dot_kitchen

  - platform: group
    name: Bedrooms
    unique_id: bedrooms_audio_group
    entities:
      - media_player.echo_dot_bedroom
      # add other bedroom echo dots
