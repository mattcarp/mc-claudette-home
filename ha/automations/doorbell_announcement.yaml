# ============================================================
# BONUS: Quiet hours mode (23:00 — 08:00)
# Softer announce, kitchen only (don't wake the whole house)
# ============================================================
- id: doorbell_quiet_hours
  alias: "Doorbell — quiet hours (kitchen only, soft)"
  description: >
    During quiet hours (23:00–08:00), only announce in the kitchen
    at a lower volume rather than whole house.
  trigger:
    - platform: state
      entity_id: binary_sensor.eufy_doorbell_t8200_button
      to: "on"
  condition:
    - condition: time
      after: "23:00:00"
      before: "08:00:00"
  action:
    - service: notify.alexa_media_echo_dot_kitchen
      data:
        message: "Someone is at the front door."
        data:
          type: announce
  mode: single
