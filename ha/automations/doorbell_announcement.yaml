# Doorbell Announcement Automation — v2
# Trigger: Eufy 340 doorbell press
# Action: Announce on all Echo Dots using Alexa Media Player 'announce' type
#         (interrupts music cleanly, auto-resumes after — no manual duck/restore needed)
#
# SETUP NOTES:
# 1. Alexa Media Player (HACS) must be installed and authenticated
# 2. 'notify.alexa_media_whole_house' is created by Alexa Media Player once configured
# 3. Verify entity names after Eufy + Alexa Media Player integrations are set up:
#    - Run: grep media_player /config/.storage/entity_registry | grep echo
#    - Or: HA → Settings → Devices & Services → Alexa Media Player
# 4. To apply: paste into /home/sysop/homeassistant/automations.yaml (or use HA UI)
#
# Why 'announce' type vs tts.google_translate_say:
#   - Alexa 'announce' is native to Echo hardware — sounds better, no lag
#   - Auto-interrupts music and resumes cleanly (google TTS doesn't do this)
#   - Works even when Echo Dot volume is set to zero (alarm-type behaviour)
#   - No dependency on Google TTS service

# ============================================================
# PRIMARY: Alexa announce (requires Alexa Media Player HACS)
# ============================================================
- id: doorbell_alexa_announce
  alias: "Doorbell — announce via Alexa (whole house)"
  description: >
    When the front doorbell is pressed, announce on all Echo Dots using Alexa
    Media Player announce type. Music is interrupted and auto-resumes.
  trigger:
    - platform: state
      entity_id: binary_sensor.eufy_doorbell_t8200_button
      to: "on"
  condition: []
  action:
    # Use Alexa Media Player notify service — 'announce' type interrupts music + auto-resumes
    - service: notify.alexa_media_whole_house
      data:
        message: "Someone is at the front door."
        data:
          type: announce
          # Optional: target specific Echo Dots instead of the whole house group
          # targets: media_player.echo_dot_living_room, media_player.echo_dot_kitchen
  mode: single


# ============================================================
# OPTIONAL: Show doorbell camera on Fire TV
# ============================================================
- id: doorbell_fire_tv_display
  alias: "Doorbell — show camera on Fire TV"
  description: >
    When doorbell pressed, display front door camera stream on Fire TV.
    Only fires if Fire TV is currently on.
  trigger:
    - platform: state
      entity_id: binary_sensor.eufy_doorbell_t8200_button
      to: "on"
  condition:
    - condition: state
      entity_id: media_player.fire_tv  # Update entity name after discovery
      state: "on"
  action:
    - service: camera.play_stream
      target:
        entity_id: camera.eufy_doorbell_t8200  # Update entity name after discovery
      data:
        media_player: media_player.fire_tv  # Update entity name after discovery
  mode: single


